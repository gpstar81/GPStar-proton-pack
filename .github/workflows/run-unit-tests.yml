name: run-unit-tests

# Trigger this workflow on any pull request which affects the shared libraries.
on:
  pull_request:
    paths:
      - 'source/SharedLib/DeviceState/**'
      - 'source/SharedLib/MagCalibration/**'
      - '.github/workflows/run-unit-tests.yml'

env:
  # Directory for test reports or sketch outputs, if used
  SKETCHES_REPORTS_PATH: sketches-reports

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Step 2: Set up a Python environment (required by PlatformIO)
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13.x'

      # Step 3: Cache PlatformIO packages and tools
      # This avoids re-downloading frameworks, toolchains, and libraries
      - name: Cache PlatformIO Packages
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      # Step 4: Install PlatformIO Core
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      # Step 5: Run common DeviceState tests
      - name: Run DeviceState Tests
        working-directory: source/SharedLib/DeviceState
        run: |
          pio run -t clean
          pio test -v

      # Step 6: Run special MagCalibration tests
      - name: Run MagCalibration Tests
        working-directory: source/SharedLib/MagCalibration
        run: |
          pio run -t clean
          pio test -v
