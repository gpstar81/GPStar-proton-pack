name: compile-test-trap

# Trigger this workflow only on pull requests affecting trap devices or shared code
on:
  pull_request:
    paths:
      - 'source/GhostTrapBase/**'
      - 'source/GhostTrapCartridge/**'
      - 'source/SharedLib/Communication/**'
      - 'source/SharedLib/DeviceState/**'
      - 'source/SharedLib/Lighting/**'
      - 'source/SharedLib/WebRouter/**'
      - 'source/SharedLib/WirelessManager/**'
      - '.github/workflows/compile-test-trap.yml'

jobs:
  compile-trap-base:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Step 2: Set up a Python environment (required by PlatformIO)
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13.7'

      # Step 3: Cache PlatformIO packages and tools
      # This avoids re-downloading frameworks, toolchains, and libraries
      - name: Cache PlatformIO Packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      # Step 4: Install PlatformIO Core
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      # Step 5: Compile SingleShot project (all environments)
      - name: Compile Trap Base
        working-directory: source/GhostTrapBase
        run: pio run --jobs 4

  compile-trap-cartridge:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Step 2: Set up a Python environment (required by PlatformIO)
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13.7'

      # Step 3: Cache PlatformIO packages and tools
      # This avoids re-downloading frameworks, toolchains, and libraries
      - name: Cache PlatformIO Packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      # Step 4: Install PlatformIO Core
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      # Step 5: Compile Attenuator project (all environments)
      - name: Compile Trap Cartridge
        working-directory: source/GhostTrapCartridge
        run: pio run --jobs 4
